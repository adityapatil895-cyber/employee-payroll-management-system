<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Employee List</title>
</head>
<body>

<h2>Employee List</h2>

<a href="/employees/add">Add New Employee</a>
<br><br>

<table border="1">
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Department</th>
    <th>Salary</th>
    <th>Bonus</th>
    <th>Tax</th>
    <th>Net Salary</th>
    <th>Actions</th>
  </tr>

  <tr th:each="emp : ${employees}">
    <td th:text="${emp.id}"></td>
    <td th:text="${emp.name}"></td>
    <td th:text="${emp.email}"></td>
    <td th:text="${emp.department}"></td>
    <td th:text="${emp.salary}"></td>
    <td th:text="${emp.bonus}"></td>
    <td th:text="${emp.tax}"></td>
    <td th:text="${emp.netSalary}"></td>

    <td>
      <a th:href="@{/employees/edit/{id}(id=${emp.id})}">Edit</a>
      |
      <a th:href="@{/employees/delete/{id}(id=${emp.id})}">Delete</a>
    </td>

  </tr>

</table>

</body>
</html>
